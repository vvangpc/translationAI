<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="mascot"></span>
      <span class="title">喵喵翻译</span>
    </div>
    <div id="warn" class="warn hidden">尚未配置 API，请先打开设置 ⚙</div>
    <div class="links">
      <button id="optionsBtn" class="link">⚙ 设置</button>
      <button id="blocklistBtn" class="link blocklist" disabled>⊘ 加入黑名单</button>
    </div>
    <small id="blocklistDomain" class="hint-domain"></small>
    <div class="hint">
      划词翻译快捷键 <kbd>Alt</kbd>+<kbd>T</kbd>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
